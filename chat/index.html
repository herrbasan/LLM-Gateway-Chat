<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>LLM Gateway Chat</title>
    
    <!-- NUI Theme -->
    <link rel="stylesheet" href="../lib/nui_wc2/NUI/css/nui-theme.css">
    <link rel="stylesheet" href="../lib/nui_wc2/NUI/css/modules/nui-syntax-highlight.css">

    <!-- Chat Styles -->
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="../lib/nui_wc2/NUI/css/modules/nui-lightbox.css">
    <link rel="stylesheet" href="../lib/nui_wc2/NUI/css/modules/nui-rich-text.css">
    
</head>
<body>
        <nui-app nui-vars-sidebar_width="16rem" nui-vars-sidebar-right_width="20rem" nui-vars-sidebar_force-breakpoint="75rem" nui-vars-sidebar-right_force-breakpoint="none">
        <nui-app-header>
            <div slot="left">
                <nui-button data-action="toggle-sidebar">
                    <button type="button" aria-label="Toggle navigation menu">
                        <nui-icon name="menu"></nui-icon>
                    </button>
                </nui-button>
                <h1 class="app-title">LLM Gateway Chat</h1>
                <a class="app-switch-link" href="/chat-arena/" title="Switch to Chat Arena">
                    <nui-icon name="article"></nui-icon>
                    <span>Arena</span>
                </a>
            </div>
            <div slot="center">
                <div class="gateway-status" id="gateway-status">
                    <span class="status-dot"></span> <span id="gateway-status-text">Gateway</span>
                </div>
            </div>
            <div slot="right">
                <nui-button data-action="admin" id="btn-admin" title="User Management" style="display: none;">
                    <button type="button" aria-label="User Management">
                        <nui-icon name="security"></nui-icon>
                    </button>
                </nui-button>
                <nui-button data-action="logout" id="btn-logout" title="Log Out">
                    <button type="button" aria-label="Log Out">
                        <nui-icon name="logout"></nui-icon>
                    </button>
                </nui-button>
                <nui-button data-action="toggle-theme" id="theme-toggle">
                    <button type="button" aria-label="Toggle light/dark theme">
                        <nui-icon name="brightness"></nui-icon>
                    </button>
                </nui-button>
                <nui-button data-action="toggle-sidebar:right">
                    <button type="button" aria-label="Settings">
                        <nui-icon name="settings"></nui-icon>
                    </button>
                </nui-button>
            </div>
        </nui-app-header>

        <nui-sidebar>
            <div class="sidebar-layout">
                <div class="sidebar-action-area">
                    <nui-button id="new-chat-btn" variant="primary">
                        <button type="button"><nui-icon name="add"></nui-icon> New Chat</button>
                    </nui-button>
                    <nui-button id="import-chat-btn" title="Import Chat">
                        <button type="button" aria-label="Upload navigation"><nui-icon name="upload"></nui-icon></button>
                    </nui-button>
                </div>

                <div class="chat-history-list" id="chat-history-list">
                    <!-- Chat history items injected here -->
                </div>
            </div>
        </nui-sidebar>

        <nui-sidebar position="right">
            <div class="sidebar-content">
                <span class="title">Configuration</span>
                
                <nui-tabs>
                    <nav>
                        <button>Model</button>
                        <button>User</button>
                        <button>System</button>
                        <button>MCP</button>
                        <button>TTS</button>
                    </nav>
                    
                    <!-- Model Tab -->
                    <div>
                        <nui-input-group class="sidebar-section">
                            <label>Model</label>
                            <nui-select id="model-select" searchable data-label="Select model...">
                                <select>
                                    <option value="">Loading models...</option>
                                </select>
                            </nui-select>
                        </nui-input-group>
                        
                        <nui-input-group class="sidebar-section">
                            <label for="temperature-input">Temperature</label>
                            <nui-input id="temperature">
                                <input type="number" min="0" max="2" step="0.1" value="0.7" id="temperature-input">
                            </nui-input>
                        </nui-input-group>

                        <div class="sidebar-section" style="display: flex; align-items: center;">
                            <nui-checkbox>
                                <input type="checkbox" id="thinking-checkbox">
                            </nui-checkbox>
                            <label for="thinking-checkbox" style="display: inline-block; margin-left: 8px; cursor: pointer;">Enable Thinking/Reasoning</label>
                        </div>
                        
                        <nui-input-group class="sidebar-section">
                            <label for="max-tokens-input">Max Tokens</label>
                            <nui-input id="max-tokens">
                                <input type="number" min="1" placeholder="Max Context" id="max-tokens-input">
                            </nui-input>
                        </nui-input-group>
                    </div>
                    
                    <!-- User Tab -->
                    <div>
                        <nui-input-group class="sidebar-section">
                            <label for="user-name-input">Your Name</label>
                            <nui-input id="user-name">
                                <input type="text" placeholder="How the AI should address you" id="user-name-input">
                            </nui-input>
                        </nui-input-group>
                        
                        <nui-input-group class="sidebar-section">
                            <label for="user-location-input">Location</label>
                            <nui-input id="user-location">
                                <input type="text" placeholder="e.g., Germany, USA, Japan" id="user-location-input">
                            </nui-input>
                        </nui-input-group>
                        
                        <nui-input-group class="sidebar-section">
                            <label for="user-language-input">Language Preference</label>
                            <nui-input id="user-language">
                                <input type="text" placeholder="e.g., English, German, Japanese" id="user-language-input">
                            </nui-input>
                        </nui-input-group>
                    </div>
                    
                    <!-- System Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>System Prompt</label>
                            <div class="preset-row">
                                <nui-select id="preset-select" data-label="Load preset...">
                                    <select></select>
                                </nui-select>
                                <nui-button id="manage-presets-btn">
                                    <button type="button"><nui-icon name="settings"></nui-icon>Manage</button>
                                </nui-button>
                            </div>
                            <nui-textarea id="system-prompt">
                                <textarea rows="6" placeholder="Optional system instructions..."></textarea>
                            </nui-textarea>
                        </div>
                        <nui-input-group class="sidebar-section">
                            <label>Operation Mode</label>
                            <nui-select id="operation-mode" data-label="Select mode...">
                                <select>
                                    <option value="sse" selected>SSE REST (Mobile Safe, Fallback)</option>
                                    <option value="websocket">WebSocket (Fast, Full-Duplex)</option>
                                </select>
                            </nui-select>
                        </nui-input-group>
                    </div>
                    
                    <!-- MCP Tab -->
                    <div>
                        <nui-input-group class="sidebar-section">
                            <label for="mcp-server-name-input">Add MCP Server</label>
                            <nui-input id="mcp-server-name">
                                <input type="text" placeholder="Server Name (e.g. Local Files)" id="mcp-server-name-input">
                            </nui-input>
                            <nui-input id="mcp-server-url" style="margin-top: 0.5rem;">
                                <input type="url" placeholder="SSE URL (e.g. http://localhost:8080/sse)">
                            </nui-input>
                            <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
                                <nui-button id="mcp-add-btn" variant="primary">
                                    <button type="button">Connect Server</button>
                                </nui-button>
                            </div>
                        </nui-input-group>
                        
                        <div class="sidebar-section">
                            <label>Connected Servers</label>
                            <div id="mcp-servers-list" style="display: flex; flex-direction: column; gap: 1rem;">
                                <!-- MCP Servers injected here -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- TTS Tab -->
                    <div>
                        <nui-input-group class="sidebar-section">
                            <label for="tts-endpoint-input">Endpoint URL</label>
                            <nui-input id="tts-endpoint">
                                <input type="url" placeholder="http://localhost:2244" id="tts-endpoint-input">
                            </nui-input>
                        </nui-input-group>
                        
                        <nui-input-group class="sidebar-section">
                            <label>Voice</label>
                            <nui-select id="tts-voice-select" searchable data-label="Select voice...">
                                <select>
                                    <option value="">Loading voices...</option>
                                </select>
                            </nui-select>
                        </nui-input-group>
                        
                        <nui-input-group class="sidebar-section">
                            <label for="tts-speed-input">Speed</label>
                            <nui-input id="tts-speed">
                                <input type="number" min="0.1" max="2.0" step="0.1" value="1.0" id="tts-speed-input">
                            </nui-input>
                        </nui-input-group>
                        
                        <div id="tts-status" class="tts-status" style="display: none;">
                            <!-- Status messages -->
                        </div>
                    </div>
                </nui-tabs>
            </div>
        </nui-sidebar>

        <nui-content>
            <nui-main>
                <!-- Main Chat Area -->
                <div class="chat-main">
                    
                    <!-- Messages Area -->
                    <div class="chat-messages" id="messages">
                        <!-- Welcome message is managed dynamically per container -->
                    </div>
                    
                    <!-- Input Area -->
                    <footer class="chat-input-area">
                        <!-- Images Row -->
                        <div class="images-row" id="images-row">
                            <div class="attachment-preview" id="attachment-preview"></div>
                        </div>
                        <!-- Input Row -->
                        <div class="input-row">
                            <div id="overall-context-progress-wrap" class="context-progress-wrap">
                                <nui-progress id="overall-context-progress" type="circular" value="0" size="28px" hide-text></nui-progress>
                            </div>
                            <nui-tooltip id="overall-context-tooltip" class="context-tooltip">Context Usage</nui-tooltip>
                            <nui-rich-text id="message-input" class="chat-input" no-toolbar placeholder="Type a message... (Shift+Enter for new line, Ctrl+Alt+V for code block)"></nui-rich-text>
                            <nui-button id="attach-btn" class="icon-only" title="Attach Image">
                                <button type="button" aria-label="Image"><nui-icon name="image"></nui-icon></button>
                            </nui-button>
                            <nui-button id="send-btn" variant="primary" title="Send">
                                <button type="button" aria-label="Send"><nui-icon name="send"></nui-icon></button>
                            </nui-button>
                        </div>
                        <input type="file" id="file-input" accept="image/*" multiple hidden>
                        <input type="file" id="import-chat-input" accept=".json" hidden>
                    </footer>
                </div>
            </nui-main>
        </nui-content>
    </nui-app>

    <!-- Login Dialog -->
    <nui-dialog id="login-dialog">
        <dialog>
            <div style="padding: 1rem; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; margin-top: 5vh;">
                <h2 style="margin: 0;">LLM Gateway Chat - Login</h2>
            <p style="color: var(--text-color-dim); text-align: center; margin-top: 0;">Please log in to access your chats.</p>
            <form id="login-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <nui-input-group>
                    <label for="login-username">Username</label>
                    <nui-input>
                        <input type="text" id="login-username" name="username" required autocomplete="username">
                    </nui-input>
                </nui-input-group>
                <nui-input-group>
                    <label for="login-password">Password</label>
                    <nui-input>
                        <input type="password" id="login-password" name="password" required autocomplete="current-password">
                    </nui-input>
                </nui-input-group>
                <div id="login-error" style="color: var(--color-error); font-size: 0.85rem; min-height: 1rem; text-align: center;"></div>
                <nui-button variant="primary" style="margin-top: 0.5rem;">
                    <button type="submit">Log In</button>
                </nui-button>
            </form>
        </div>
    </nui-dialog>

    <!-- Chat Options Dialog -->
    <template id="chat-options-template">
        <div data-chat-id="" style="padding: var(--nui-space); display: flex; flex-direction: column; gap: var(--nui-space);">
            
            <div class="sidebar-section">
                <label>Chat Info & Statistics</label>
                <div style="background: var(--color-shade2); padding: 0.75rem; border-radius: var(--border-radius1); font-size: 0.875rem; color: var(--text-color-dim); display: flex; flex-direction: column; gap: 0.25rem;">
                    <div><strong>Created:</strong> <span id="chat-options-created-date">-</span></div>
                    <div><strong>Last Updated:</strong> <span id="chat-options-updated-date">-</span></div>
                    <div><strong>Messages:</strong> <span id="chat-options-msg-count">-</span></div>
                </div>
            </div>

            <div class="sidebar-section">
                  <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem;">
                      <nui-input-group>
                          <label for="chat-options-title-input">Chat Title</label>
                          <nui-input>
                              <input type="text" id="chat-options-title-input" placeholder="Enter title...">
                          </nui-input>
                      </nui-input-group>
                      <nui-input-group>
                          <label for="chat-options-category-input">Category</label>
                          <nui-input>
                              <input type="text" id="chat-options-category-input" placeholder="Enter category...">
                          </nui-input>
                      </nui-input-group>
                </div>
                <nui-checkbox title="Pin this chat to the top of the history list">
                    <input type="checkbox" id="chat-options-pin-toggle"> Pin to Top
                </nui-checkbox>
            </div>

            <div class="sidebar-section">
                <label>Actions & Export</label>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    <nui-button title="Create a copy of this conversation">
                        <button type="button" data-action="chat-options:clone"><nui-icon name="content_copy"></nui-icon> Clone Chat</button>
                    </nui-button>
                    <nui-button title="Copy conversation JSON to clipboard">
                        <button type="button" data-action="chat-options:copy-json"><nui-icon name="content_copy"></nui-icon> Copy JSON</button>
                    </nui-button>
                    <nui-button title="Export to file (with images)">
                        <button type="button" data-action="chat-options:save-json"><nui-icon name="download"></nui-icon> Save JSON</button>
                    </nui-button>
                    <nui-button title="Export Markdown">
                        <button type="button" data-action="chat-options:save-md"><nui-icon name="download"></nui-icon> Save Markdown</button>
                    </nui-button>
                </div>
            </div>

            <div class="sidebar-section" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-shade1);">
                <label style="color: var(--color-danger);">Danger Zone</label>
                <nui-button variant="danger">
                    <button type="button" data-action="chat-options:delete"><nui-icon name="delete"></nui-icon> Delete Conversation</button>
                </nui-button>
            </div>
        </div>
    </template>

    <!-- Summarize Dialog -->
    <nui-dialog id="summarize-dialog">
        <dialog>
            <div style="padding: 1rem; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem;">
                <h2 style="margin: 0;">Conversation Summary</h2>
                <div id="summarize-status" style="color: var(--text-color-dim); font-style: italic;">Generating summary...</div>
                <nui-textarea style="flex: 1; display: flex; flex-direction: column; min-height: 15rem;">
                    <textarea id="summarize-output" readonly style="flex: 1; font-family: inherit; font-size: 0.9rem; line-height: 1.6; resize: none; background: var(--color-shade1); color: var(--text-color);"></textarea>
                </nui-textarea>
                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <nui-button id="summarize-copy-btn">
                        <button type="button">Copy</button>
                    </nui-button>
                    <nui-button>
                        <button type="button" data-action="dialog-close@#summarize-dialog">Close</button>
                    </nui-button>
                </div>
            </div>
        </dialog>
    </nui-dialog>

    <!-- MCP Edit Dialog -->
    <template id="mcp-edit-template">
        <div style="padding: 1rem; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem;">
            <nui-input-group>
                <label>Server URL</label>
                <nui-input>
                    <input type="text" id="mcp-edit-url" readonly style="color: var(--color-shade5);">
                </nui-input>
            </nui-input-group>

            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="margin: 0; color: var(--text-color); font-size: 1.1rem;">Available Tools</h3>
                    <nui-button variant="ghost" id="mcp-edit-toggle-all">
                        <button type="button">Toggle All</button>
                    </nui-button>
                </div>
                <div id="mcp-edit-tools-container" style="display: flex; flex-direction: column;">
                    <!-- populated dynamically -->
                </div>
            </div>
        </div>
    </template>

    <!-- Config - Edit chat/js/config.js to configure your Gateway -->
    <script src="js/config.js?v=2"></script>

    <!-- Scripts -->
    <script src="../lib/nui_wc2/NUI/nui.js" type="module"></script>
    <script src="../lib/nui_wc2/NUI/lib/modules/nui-lightbox.js" type="module"></script>
    <script src="../lib/nui_wc2/NUI/lib/modules/nui-rich-text.js" type="module"></script>
    <script src="js/chat.js?v=3" type="module"></script>
    <script>
        // NUI specific interactions for app shell
        document.addEventListener('click', (e) => {
            const actionEl = e.target.closest('[data-action]');
            if (!actionEl) return;
            
            const action = actionEl.dataset.action;
            const app = document.querySelector('nui-app');
            
            switch (action) {
                case 'toggle-sidebar':
                    e.preventDefault();
                    if(app) app.toggleSidebar();
                    break;
                case 'toggle-sidebar:right':
                    e.preventDefault();
                    if(app) app.toggleSidebar('right');
                    break;
            }
        });
    </script>

    <nui-dialog id="presets-dialog" mode="page" title="System Prompt Presets" style="--space-page-maxwidth: 90%;">
        <div class="presets-dialog-layout">
            <div class="presets-sidebar-col">
                <div class="presets-sidebar-header">
                    <nui-button id="preset-add-btn">
                        <button type="button"><nui-icon name="add"></nui-icon>New</button>
                    </nui-button>
                </div>
                <nui-column-flow class="presets-sidebar">
                    <!-- Filled by JS -->
                </nui-column-flow>
            </div>
            <div class="presets-editor">
                <div class="presets-editor-top">
                    <nui-input-group style="flex:1;">
                        <label for="preset-name-input" style="display: none;">Preset Name</label>
                        <nui-input id="preset-name-wrapper">
                            <input type="text" id="preset-name-input" placeholder="Preset name...">
                        </nui-input>
                    </nui-input-group>
                    <nui-button id="preset-save">
                        <button type="button"><nui-icon name="save"></nui-icon>Save Preset</button>
                    </nui-button>
                </div>
                <nui-rich-text id="preset-editor">
                </nui-rich-text>
            </div>
        </div>
    </nui-dialog>
</body>
</html>
