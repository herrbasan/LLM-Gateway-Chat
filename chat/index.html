<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>LLM Gateway Chat</title>
    
    <!-- NUI Theme -->
    <link rel="stylesheet" href="../nui_wc2/NUI/css/nui-theme.css">
    <link rel="stylesheet" href="../nui_wc2/NUI/css/modules/nui-syntax-highlight.css">
    
    <!-- Vendor -->
    <link rel="stylesheet" href="../shared/vendor/prism.css">
    
    <!-- Chat Styles -->
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="../nui_wc2/NUI/css/modules/nui-lightbox.css">
    <link rel="stylesheet" href="../nui_wc2/NUI/css/modules/nui-rich-text.css">
    
</head>
<body>
    <nui-app nui-vars-sidebar_width="16rem" nui-vars-sidebar-right_width="20rem" nui-vars-sidebar_force-breakpoint="75rem" nui-vars-sidebar-right_force-breakpoint="none">
        <nui-app-header>
            <div slot="left">
                <nui-button data-action="toggle-sidebar">
                    <button type="button" aria-label="Toggle navigation menu">
                        <nui-icon name="menu"></nui-icon>
                    </button>
                </nui-button>
                <h1 class="app-title">LLM Gateway Chat</h1>
            </div>
            <div slot="center">
                <div class="gateway-status" id="gateway-status">
                    <span class="status-dot"></span> <span id="gateway-status-text">Gateway</span>
                </div>

            </div>
            <div slot="right">
                <nui-button data-action="toggle-theme" id="theme-toggle">
                    <button type="button" aria-label="Toggle light/dark theme">
                        <nui-icon name="brightness"></nui-icon>
                    </button>
                </nui-button>
                <nui-button data-action="toggle-sidebar:right">
                    <button type="button" aria-label="Settings">
                        <nui-icon name="settings"></nui-icon>
                    </button>
                </nui-button>
            </div>
        </nui-app-header>

        <nui-sidebar>
            <div class="sidebar-layout">
                <div class="sidebar-action-area">
                    <nui-button id="new-chat-btn" variant="primary">
                        <button type="button"><nui-icon name="add"></nui-icon> New Chat</button>
                    </nui-button>
                    <nui-button id="import-chat-btn" title="Import Chat">
                        <button type="button"><nui-icon name="upload"></nui-icon></button>
                    </nui-button>
                </div>

                <h3>History</h3>
                <div class="chat-history-list" id="chat-history-list">
                    <!-- Chat history items injected here -->
                </div>
            </div>
        </nui-sidebar>

        <nui-sidebar position="right">
            <div class="sidebar-content">
                <span class="title">Configuration</span>
                
                <nui-tabs>
                    <nav>
                        <button>Model</button>
                        <button>User</button>
                        <button>System</button>
                        <button>MCP</button>
                    </nav>
                    
                    <!-- Model Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>Model</label>
                            <nui-select id="model-select" searchable data-label="Select model...">
                                <select>
                                    <option value="">Loading models...</option>
                                </select>
                            </nui-select>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Temperature</label>
                            <nui-input id="temperature">
                                <input type="number" min="0" max="2" step="0.1" value="0.7">
                            </nui-input>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Max Tokens</label>
                            <nui-input id="max-tokens">
                                <input type="number" min="1" placeholder="Max Context">
                            </nui-input>
                        </div>
                    </div>
                    
                    <!-- User Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>Your Name</label>
                            <nui-input id="user-name">
                                <input type="text" placeholder="How the AI should address you">
                            </nui-input>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Location</label>
                            <nui-input id="user-location">
                                <input type="text" placeholder="e.g., Germany, USA, Japan">
                            </nui-input>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Language Preference</label>
                            <nui-input id="user-language">
                                <input type="text" placeholder="e.g., English, German, Japanese">
                            </nui-input>
                        </div>
                    </div>
                    
                    <!-- System Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>System Prompt</label>
                            <nui-textarea id="system-prompt">
                                <textarea rows="6" placeholder="Optional system instructions..."></textarea>
                            </nui-textarea>
                        </div>
                    </div>
                    
                    <!-- MCP Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>Add MCP Server</label>
                            <nui-input id="mcp-server-name">
                                <input type="text" placeholder="Server Name (e.g. Local Files)">
                            </nui-input>
                            <nui-input id="mcp-server-url" style="margin-top: 0.5rem;">
                                <input type="url" placeholder="SSE URL (e.g. http://localhost:8080/sse)">
                            </nui-input>
                            <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
                                <nui-button id="mcp-add-btn" variant="primary">
                                    <button type="button">Connect Server</button>
                                </nui-button>
                                <nui-button id="mcp-logs-btn">
                                    <button type="button">Show Logs</button>
                                </nui-button>
                            </div>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Connected Servers</label>
                            <div id="mcp-servers-list" style="display: flex; flex-direction: column; gap: 1rem;">
                                <!-- MCP Servers injected here -->
                            </div>
                        </div>
                    </div>
                </nui-tabs>
            </div>
        </nui-sidebar>

        <nui-content>
            <nui-main>
                <!-- Main Chat Area -->
                <div class="chat-main">
                    
                    <!-- Messages Area -->
                    <div class="chat-messages" id="messages">
                        <div class="welcome-message">
                            <h2>Welcome to LLM Gateway Chat</h2>
                            <p>Select a model and start chatting</p>
                        </div>
                    </div>
                    
                    <!-- Input Area -->
                    <footer class="chat-input-area">
                        <div class="attachment-preview" id="attachment-preview"></div>
                        <div class="input-row">                              <div id="overall-context-progress-wrap" class="context-progress-wrap"><nui-progress id="overall-context-progress" type="circular" value="0" size="28px" hide-text></nui-progress></div><nui-tooltip id="overall-context-tooltip" class="context-tooltip">Context Usage</nui-tooltip>                            <nui-rich-text id="message-input" class="chat-input" no-toolbar placeholder="Type a message... (Shift+Enter for new line, Ctrl+Alt+V for code block)"></nui-rich-text>
                            <nui-button id="attach-btn" class="icon-only" title="Attach Image">
                                <button type="button"><nui-icon name="image"></nui-icon></button>
                            </nui-button>
                            <nui-button id="send-btn" variant="primary" title="Send">
                                <button type="button"><nui-icon name="send"></nui-icon></button>
                            </nui-button>
                        </div>
                        <input type="file" id="file-input" accept="image/*" multiple hidden>
                        <input type="file" id="import-chat-input" accept=".json" hidden>
                    </footer>
                </div>
            </nui-main>
        </nui-content>
    </nui-app>

    <!-- MCP Logs Dialog -->
    <nui-dialog id="mcp-logs-dialog">
        <dialog>
            <div style="padding: 1rem; width: 80vw; max-width: 800px; height: 80vh; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2 style="margin: 0; color: var(--nui-fg);">MCP Logs</h2>
                    <nui-button id="mcp-logs-clear-btn">
                        <button type="button">Clear</button>
                    </nui-button>
                </div>
                <nui-textarea style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <textarea id="mcp-logs-textarea" readonly style="flex: 1; font-family: monospace; font-size: 0.85rem; background: var(--nui-shade1, #1e1e1e); color: var(--nui-fg, #ccc); resize: none;"></textarea>
                </nui-textarea>
                <div style="margin-top: 1rem; text-align: right;">
                    <nui-button onclick="document.getElementById('mcp-logs-dialog').close()">
                        <button type="button">Close</button>
                    </nui-button>
                </div>
            </div>
        </dialog>
    </nui-dialog>

      <!-- MCP Edit Dialog -->
      <nui-dialog id="mcp-edit-dialog" mode="page" title="Edit Server" data-buttons='[{"label": "Close", "type": "primary", "value": "close"}]'>
          <div style="padding: 1rem; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem;">
              <nui-input>
                  <label>Server URL</label>
                  <input type="text" id="mcp-edit-url" readonly style="color: var(--nui-shade5);">
              </nui-input>

              <div>
                  <h3 style="margin: 0 0 1rem 0; color: var(--nui-fg); font-size: 1.1rem;">Available Tools</h3>
                  <div id="mcp-edit-tools-container" style="display: flex; flex-direction: column;">
                      <!-- populated dynamically -->
                  </div>
              </div>
          </div>
      </nui-dialog>

    <!-- Config - Edit chat/js/config.js to configure your Gateway -->
    <script src="js/config.js"></script>

    <!-- Scripts -->
    <script src="../shared/vendor/prism.js"></script>
    <script src="../shared/vendor/markdown-it.js"></script>
    <script src="../shared/vendor/purify.js"></script>
    <script src="../shared/vendor/markdown-it-prism.js"></script>
    <script src="../nui_wc2/NUI/nui.js" type="module"></script>
    <script src="../nui_wc2/NUI/lib/modules/nui-lightbox.js" type="module"></script>
    <script src="../nui_wc2/NUI/lib/modules/nui-rich-text.js" type="module"></script>
    <script src="js/chat.js" type="module"></script>
    <script>
        // NUI specific interactions for app shell
        document.addEventListener('click', (e) => {
            const actionEl = e.target.closest('[data-action]');
            if (!actionEl) return;
            
            const action = actionEl.dataset.action;
            const app = document.querySelector('nui-app');
            
            switch (action) {
                case 'toggle-sidebar':
                    e.preventDefault();
                    if(app) app.toggleSideNav();
                    break;
                case 'toggle-sidebar:right':
                    e.preventDefault();
                    if(app) app.toggleSideNav('right');
                    break;
            }
        });
    </script>
</body>
</html>
