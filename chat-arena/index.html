<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Chat Arena</title>

    <!-- NUI Theme -->
    <link rel="stylesheet" href="../lib/nui_wc2/NUI/css/nui-theme.css">
    <link rel="stylesheet" href="../lib/nui_wc2/NUI/css/modules/nui-syntax-highlight.css">

    <!-- Chat Styles -->
    <link rel="stylesheet" href="../chat/css/chat.css">

    <!-- Arena Styles -->
    <link rel="stylesheet" href="js/arena.css">
</head>
<body>
        <nui-app sidebar-width="20rem" nui-vars-sidebar_force-breakpoint="50rem" nui-vars-sidebar-right_force-breakpoint="none">
        <nui-app-header>
            <div slot="left">
                <nui-button data-action="toggle-sidebar">
                    <button type="button" aria-label="Toggle menu">
                        <nui-icon name="menu"></nui-icon>
                    </button>
                </nui-button>
                <h1 class="app-title">Chat Arena</h1>
                <a class="app-switch-link" href="/chat/" title="Switch to standard chat">
                    <nui-icon name="article"></nui-icon>
                    <span>Chat</span>
                </a>
            </div>
            <div slot="center"></div>
            <div slot="right">
                <nui-button data-action="logout" id="btn-logout" title="Log Out">
                    <button type="button" aria-label="Log Out">
                        <nui-icon name="logout"></nui-icon>
                    </button>
                </nui-button>
                <nui-button data-action="toggle-theme" id="theme-toggle">
                    <button type="button" aria-label="Toggle light/dark theme">
                        <nui-icon name="brightness"></nui-icon>
                    </button>
                </nui-button>
                <nui-button data-action="toggle-sidebar:right">
                    <button type="button" aria-label="Toggle settings">
                        <nui-icon name="settings"></nui-icon>
                    </button>
                </nui-button>
            </div>
        </nui-app-header>

        <nui-sidebar>
            <div class="sidebar-layout">
                <div class="sidebar-action-area">
                    <nui-button id="new-arena-btn" variant="primary">
                        <button type="button"><nui-icon name="add"></nui-icon> New Arena</button>
                    </nui-button>
                    <nui-button id="import-arena-btn" title="Import Arena">
                        <button type="button"><nui-icon name="upload"></nui-icon> Import</button>
                    </nui-button>
                </div>
                <div class="arena-history-controls" id="arena-history-controls">
                    <div class="arena-history-controls-row">
                        <nui-select id="arena-sort-select" data-label="Sort">
                            <select>
                                <option value="updatedAt">Modified</option>
                                <option value="createdAt">Created</option>
                            </select>
                        </nui-select>
                    </div>
                    <div class="arena-history-controls-row">
                        <nui-checkbox title="Group sessions by category">
                            <input type="checkbox" id="arena-group-checkbox" checked>
                        </nui-checkbox>
                        <label for="arena-group-checkbox">Group</label>
                        <nui-checkbox title="Show pinned sessions first">
                            <input type="checkbox" id="arena-pin-checkbox" checked>
                        </nui-checkbox>
                        <label for="arena-pin-checkbox">Pins</label>
                    </div>
                </div>
                <div class="arena-history-list" id="arena-history-list">
                    <!-- Arena history items injected here -->
                </div>
            </div>
        </nui-sidebar>

        <nui-sidebar position="right">
            <div class="sidebar-content">
                <span class="title">Configuration</span>
                
                <nui-tabs>
                    <nav>
                        <button>Conversation</button>
                        <button>TTS</button>
                    </nav>
                    
                    <!-- Conversation Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>Topic</label>
                            <nui-textarea>
                                <textarea id="topic-input" placeholder="Enter a topic for the conversation..." rows="2"></textarea>
                            </nui-textarea>
                        </div>

                        <div class="sidebar-section">
                            <label>Participant A</label>
                            <nui-select id="model-a-select" searchable data-label="Select model...">
                                <select>
                                    <option value="">Loading models...</option>
                                </select>
                            </nui-select>
                        </div>

                        <div class="sidebar-section">
                            <label>Participant B</label>
                            <nui-select id="model-b-select" searchable data-label="Select model...">
                                <select>
                                    <option value="">Loading models...</option>
                                </select>
                            </nui-select>
                        </div>

                        <div class="sidebar-section">
                            <label>Max Tokens per Response</label>
                            <nui-input>
                                <input type="number" id="max-tokens" min="1" placeholder="Empty = gateway default">
                            </nui-input>
                        </div>

                        <div class="sidebar-section">
                            <label>Max Turns</label>
                            <nui-input>
                                <input type="number" id="max-turns" min="1" max="50" value="10">
                            </nui-input>
                        </div>

                        <div class="sidebar-section">
                            <label>Temperature: <span id="temperature-value">0.7</span></label>
                            <nui-input>
                                <input type="range" id="temperature-slider" min="0" max="2" step="0.1" value="0.7">
                            </nui-input>
                        </div>

                        <div class="sidebar-section">
                            <div class="checkbox-group">
                                <nui-checkbox>
                                    <input type="checkbox" id="thinking-checkbox">
                                </nui-checkbox>
                                <label for="thinking-checkbox">Enable Thinking/Reasoning</label>
                            </div>
                        </div>

                        <div class="sidebar-section">
                            <div class="checkbox-group">
                                <nui-checkbox>
                                    <input type="checkbox" id="auto-advance-checkbox" checked>
                                </nui-checkbox>
                                <label for="auto-advance-checkbox">Auto-Advance</label>
                            </div>
                        </div>

                        <div class="sidebar-section">
                            <div class="checkbox-group">
                                <nui-checkbox>
                                    <input type="checkbox" id="roleplay-checkbox">
                                </nui-checkbox>
                                <label for="roleplay-checkbox">Roleplay Mode</label>
                            </div>
                        </div>

                        <div id="roleplay-section" class="roleplay-section" style="display: none;">
                            <div class="sidebar-section">
                                <label>Participant A System Prompt</label>
                                <nui-textarea>
                                    <textarea id="system-prompt-a" rows="3">You are in a conversation. Your identity: {modelName}.
You are speaking with {otherParticipantName} (model: {otherModelName}).
Topic: {topic}
Speak naturally as if in a thoughtful conversation.</textarea>
                                </nui-textarea>
                            </div>
                            <div class="sidebar-section">
                                <label>Participant B System Prompt</label>
                                <nui-textarea>
                                    <textarea id="system-prompt-b" rows="3">You are in a conversation. Your identity: {modelName}.
You are speaking with {otherParticipantName} (model: {otherModelName}).
Topic: {topic}
Speak naturally as if in a thoughtful conversation.</textarea>
                                </nui-textarea>
                            </div>
                        </div>

                        <nui-button variant="primary" id="start-btn" style="margin-top: 1rem;">
                            <button type="button">Start Conversation</button>
                        </nui-button>
                    </div>
                    
                    <!-- TTS Tab -->
                    <div>
                        <div class="sidebar-section">
                            <label>Endpoint URL</label>
                            <nui-input id="tts-endpoint">
                                <input type="url" placeholder="http://localhost:2233">
                            </nui-input>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Voice A</label>
                            <nui-select id="tts-voice-a-select" searchable data-label="Select voice...">
                                <select>
                                    <option value="">Loading voices...</option>
                                </select>
                            </nui-select>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Voice B</label>
                            <nui-select id="tts-voice-b-select" searchable data-label="Select voice...">
                                <select>
                                    <option value="">Loading voices...</option>
                                </select>
                            </nui-select>
                        </div>
                        
                        <div class="sidebar-section">
                            <label>Speed</label>
                            <nui-input id="tts-speed">
                                <input type="number" min="0.1" max="2.0" step="0.1" value="1.0">
                            </nui-input>
                        </div>
                        
                        <div id="tts-status" class="tts-status" style="display: none;"></div>
                    </div>
                </nui-tabs>
            </div>
        </nui-sidebar>

        <nui-content>
            <nui-main>
                <div class="arena-messages" id="arena-messages">
                    <div class="welcome-message" id="arena-welcome">
                        <h2>Welcome to Chat Arena</h2>
                        <p>Configure your arena in the sidebar and click Start to begin</p>
                    </div>
                    <nui-button id="scroll-to-bottom" class="scroll-to-bottom" style="display: none;">
                        <button type="button"><nui-icon name="arrow"></nui-icon></button>
                    </nui-button>
                </div>

                <footer class="arena-footer" id="arena-footer" style="display: none;">
                    <div class="arena-flow-controls">
                        <span class="turn-info" id="turn-info">Turn 0/0</span>
                        <span class="context-usage" id="context-usage" title="Context window usage (limiting factor)">-- / --</span>
                        <span class="speaker-indicator" id="speaker-indicator"></span>
                        <div class="arena-flow-actions">
                            <nui-button variant="outline" size="small" id="continue-btn">
                                <button type="button">
                                    <nui-icon name="play"></nui-icon>
                                    Continue
                                </button>
                            </nui-button>
                            <nui-button variant="primary" size="small" id="stop-btn">
                                <button type="button">
                                    <nui-icon name="close"></nui-icon>
                                    Stop
                                </button>
                            </nui-button>
                            <nui-button variant="outline" size="small" id="summarize-btn" title="Edit / Summarize">
                                <button type="button">
                                        <nui-icon name="article"></nui-icon>
                                </button>
                            </nui-button>
                        </div>
                    </div>
                    <div class="arena-prompt-area">
                        <nui-textarea>
                            <textarea id="arena-prompt-input" rows="2" placeholder="Send a message to both models or use flow controls above..."></textarea>
                        </nui-textarea>
                        <nui-button variant="primary" id="arena-send-btn" title="Send to current speaker">
                            <button type="button"><nui-icon name="send"></nui-icon></button>
                        </nui-button>
                    </div>
                </footer>
            </nui-main>
        </nui-content>
    </nui-app>

    <!-- Arena Config -->
    <script src="js/config.js"></script>

    <!-- Chat Backend Config (for nDB storage) -->
    <script src="../chat/js/config.js"></script>

    <!-- NUI Library -->
    <script src="../lib/nui_wc2/NUI/nui.js" type="module"></script>
    <script src="../lib/nui_wc2/NUI/lib/modules/nui-rich-text.js" type="module"></script>

    <!-- Arena App -->
    <script type="module" src="js/arena.js"></script>

    <script>
        // NUI specific interactions for app shell
        document.addEventListener('click', (e) => {
            const actionEl = e.target.closest('[data-action]');
            if (!actionEl) return;

            const action = actionEl.dataset.action;
            const app = document.querySelector('nui-app');

            switch (action) {
                case 'toggle-sidebar':
                    e.preventDefault();
                    if (app) app.toggleSidebar();
                    break;
                case 'toggle-sidebar:right':
                    e.preventDefault();
                    if (app) app.toggleSidebar('right');
                    break;
                case 'toggle-theme':
                    e.preventDefault();
                    if (app) {
                        const current = document.documentElement.getAttribute('data-theme') || 'light';
                        const next = current === 'dark' ? 'light' : 'dark';
                        document.documentElement.setAttribute('data-theme', next);
                        document.documentElement.style.colorScheme = next;
                        localStorage.setItem('nui-theme', next);
                        window.arenaUI?._setPref?.('theme', next);
                    }
                    break;
                case 'logout':
                    e.preventDefault();
                    (async () => {
                        try { await backendClient.logout(); } catch (err) { console.warn('Logout failed', err); }
                        window.location.reload();
                    })();
                    break;
            }
        });

        // Centralized arena-options action handler (mirrors chat's handleChatOptionsAction)
        document.addEventListener('nui-action-arena-options', (e) => {
            console.log('[arena-options] action event fired, detail:', e.detail);
            const handler = window._arenaOptionsHandler;
            if (handler) handler(e.detail);
            else console.warn('[arena-options] no handler registered');
        });

        // Toggle thinking block visibility (kept for any historical messages that still call it)
        window.toggleThinking = function(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.toggle('collapsed');
            }
        };
    </script>

    <!-- Login Dialog -->
    <nui-dialog id="login-dialog">
        <dialog>
            <div style="padding: 1rem; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; margin-top: 5vh;">
                <h2 style="margin: 0;">Chat Arena - Login</h2>
                <p style="color: var(--text-color-dim); text-align: center; margin-top: 0;">Please log in to access your arenas.</p>
                <form id="login-form" style="display: flex; flex-direction: column; gap: 1rem;">
                    <nui-input-group>
                        <label for="login-username">Username</label>
                        <nui-input>
                            <input type="text" id="login-username" name="username" required autocomplete="username">
                        </nui-input>
                    </nui-input-group>
                    <nui-input-group>
                        <label for="login-password">Password</label>
                        <nui-input>
                            <input type="password" id="login-password" name="password" required autocomplete="current-password">
                        </nui-input>
                    </nui-input-group>
                    <div id="login-error" style="color: var(--color-error); font-size: 0.85rem; min-height: 1rem; text-align: center;"></div>
                    <nui-button variant="primary" style="margin-top: 0.5rem;">
                        <button type="submit">Log In</button>
                    </nui-button>
                </form>
            </div>
        </dialog>
    </nui-dialog>

    <!-- Arena Options Template (consolidated edit + summary + actions dialog) -->
    <template id="arena-options-template">
        <div data-arena-id="" style="padding: var(--nui-space); display: flex; flex-direction: column; gap: var(--nui-space);">

            <div class="sidebar-section">
                <label>Arena Info</label>
                <div style="background: var(--color-shade2); padding: 0.75rem; border-radius: var(--border-radius1); font-size: 0.875rem; color: var(--text-color-dim); display: flex; flex-direction: column; gap: 0.25rem;">
                    <div><strong>Created:</strong> <span id="arena-options-created-date">-</span></div>
                    <div><strong>Last Updated:</strong> <span id="arena-options-updated-date">-</span></div>
                    <div><strong>Messages:</strong> <span id="arena-options-msg-count">-</span></div>
                    <div><strong>Participants:</strong> <span id="arena-options-participants">-</span></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <nui-input-group>
                        <label for="arena-options-title-input">Title</label>
                        <nui-input>
                            <input type="text" id="arena-options-title-input" placeholder="Enter title...">
                        </nui-input>
                    </nui-input-group>
                    <nui-input-group>
                        <label for="arena-options-category-input">Category</label>
                        <nui-input>
                            <input type="text" id="arena-options-category-input" placeholder="Enter category...">
                        </nui-input>
                    </nui-input-group>
                </div>
                <nui-checkbox title="Pin this arena to the top of the history list" style="margin-top: 0.5rem;">
                    <input type="checkbox" id="arena-options-pin-toggle"> Pin to Top
                </nui-checkbox>
            </div>

            <div class="sidebar-section">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;">
                    <label style="margin: 0;">AI Summary</label>
                    <nui-button size="small" id="arena-options-generate-btn">
                        <button type="button" data-action="arena-options:generate">Generate</button>
                    </nui-button>
                </div>
                <nui-select id="arena-options-summary-model-select" searchable data-label="Select model...">
                    <select>
                        <option value="">Loading models...</option>
                    </select>
                </nui-select>
                <div id="arena-options-summary-status" style="color: var(--text-color-dim); font-style: italic; font-size: 0.875rem; min-height: 1.25rem;"></div>
                <nui-input-group>
                    <label for="arena-options-teaser-input">Teaser</label>
                    <nui-textarea>
                        <textarea id="arena-options-teaser-input" rows="3" placeholder="A short hook..."></textarea>
                    </nui-textarea>
                </nui-input-group>
                <nui-input-group>
                    <label for="arena-options-reflection-input">Reflection</label>
                    <nui-textarea>
                        <textarea id="arena-options-reflection-input" rows="10" placeholder="A long-form reflection on the conversation..."></textarea>
                    </nui-textarea>
                </nui-input-group>
            </div>

            <div class="sidebar-section">
                <label>Actions &amp; Export</label>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    <nui-button title="Copy arena JSON to clipboard">
                        <button type="button" data-action="arena-options:copy-json"><nui-icon name="content_copy"></nui-icon> Copy JSON</button>
                    </nui-button>
                    <nui-button title="Export to file">
                        <button type="button" data-action="arena-options:save-json"><nui-icon name="download"></nui-icon> Save JSON</button>
                    </nui-button>
                    <nui-button title="Export Markdown">
                        <button type="button" data-action="arena-options:save-md"><nui-icon name="download"></nui-icon> Save Markdown</button>
                    </nui-button>
                </div>
            </div>

            <div class="sidebar-section" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-shade1);">
                <label style="color: var(--color-danger);">Danger Zone</label>
                <nui-button variant="danger">
                    <button type="button" data-action="arena-options:delete"><nui-icon name="delete"></nui-icon> Delete Arena</button>
                </nui-button>
            </div>
        </div>
    </template>
</body>
</html>
